<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Park Bulletin | Strategic Analysis</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-overlay">
        <div class="glass-container">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>

            <div class="login-card">
                <div class="logo-section">
                    <img src="img/LOGO_ITParkll.png" alt="IT Park Logo" class="login-logo">
                    <span class="badge-beta">Internal Portal</span>
                </div>
                
                <div class="auth-toggle">
                    <button id="btn-show-login" class="active" onclick="toggleAuthMode('login')">Sign In</button>
                    <button id="btn-show-register" onclick="toggleAuthMode('register')">Register</button>
                </div>

                <div id="form-login">
                    <h1 style="font-size:1.5rem; margin-bottom:5px;">Welcome Back</h1>
                    <p class="subtitle" style="margin-bottom:20px;">Enter your credentials to access</p>

                    <div class="input-group">
                        <input type="email" id="login-email" placeholder="Email Address">
                    </div>
                    <div class="input-group">
                        <input type="password" id="login-password" placeholder="Password">
                    </div>
                    
                    <button class="primary-btn" onclick="handleManualLogin()">Sign In</button>

                    <div class="divider"><span>OR</span></div>

                    <button class="google-btn-large" onclick="loginWithGoogle()">
                        <div class="icon-wrapper"><img src="img/google.webp" width="20"></div>
                        <span class="btn-title">Continue with Google</span>
                    </button>
                </div>

                <div id="form-register" style="display:none;">
                    <h1 style="font-size:1.5rem; margin-bottom:5px;">New Account</h1>
                    <p class="subtitle" style="margin-bottom:20px;">Join the Strategy Department</p>

                    <div class="input-group">
                        <input type="text" id="reg-name" placeholder="Full Name">
                    </div>
                    <div class="input-group">
                        <input type="email" id="reg-email" placeholder="Email Address">
                    </div>
                    <div class="input-group">
                        <select id="reg-dept">
                            <option value="General">Select Department...</option>
                            <option value="Strategy">Strategy</option>
                            <option value="Data">Data Analysis</option>
                            <option value="Investment">Investment</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <input type="password" id="reg-password" placeholder="Create Password">
                    </div>

                    <button class="primary-btn" onclick="handleRegister()">Create Account</button>
                </div>

            </div>
        </div>
    </div>

    <div id="app-wrapper">
        
        <header>
            <div class="header-container">
                <div class="logo-area">
                    <i class="fa-solid fa-newspaper logo-icon"></i>
                    <h1>IT Park Bulletin</h1>
                </div>

                <div id="user-info" class="user-profile-pill" style="display:none;">
                    <div class="user-text">
                        <span id="user-name" class="name">Loading...</span>
                        <span id="user-dept" class="dept">General Dept</span>
                    </div>
                    <img id="user-avatar" src="" alt="Profile" class="avatar-img">
                    <button onclick="logout()" class="logout-mini-btn" title="Sign Out">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </button>
                </div>
            </div>
        </header>

        <div class="main-wrapper">
            
            <aside class="sidebar">
                <nav class="sidebar-nav">
                    <button onclick="showTab('all')" id="tab-all" class="active">
                        <i class="fa-solid fa-globe"></i> News Feed
                    </button>
                    <button onclick="showTab('saved')" id="tab-saved">
                        <i class="fa-solid fa-bookmark"></i> Saved Items
                    </button>
                    <button onclick="showTab('dashboard')" id="tab-dashboard">
                        <i class="fa-solid fa-chart-pie"></i> Analytics
                    </button>
                    <button onclick="showTab('nla')" id="tab-nla">
                        <i class="fa-solid fa-gavel"></i> Legislation (NLA)
                    </button>
                    <button onclick="showTab('stats')" id="tab-stats">
                        <i class="fa-solid fa-building"></i> Statistics & Hubs
                    </button>
                    <button onclick="showTab('archive')" id="tab-archive">
                        <i class="fa-solid fa-folder-open"></i> Research Archive
                    </button>
                </nav>

                <div class="report-box" id="report-actions">
                    <div class="report-info">
                        <i class="fa-solid fa-file-pdf"></i>
                        <span>Selected for Report</span>
                    </div>
                    <button id="generate-report-btn">Generate PDF</button>
                </div>
            </aside>

            <section class="content-area">
                
                <div class="content-header" id="main-header">
                    <h2 id="tab-title">News Feed</h2>
                </div>

                <section id="filters">
                    <div class="filter-group">
                        <div class="select-wrapper">
                            <select id="topic-filter">
                                <option value="">All Topics</option>
                                <option value="AI">Artificial Intelligence</option>
                                <option value="Startup">Startups</option>
                                <option value="Tech">Technology</option>
                                <option value="Investment">Investment</option>
                                <option value="General">General</option>
                            </select>
                            <i class="fa-solid fa-chevron-down"></i>
                        </div>

                        <div class="select-wrapper">
                            <select id="department-filter">
                                <option value="">All Departments</option>
                                <option value="Data">Data Analysis</option>
                                <option value="Strategy">Strategy</option>
                                <option value="Development">Development</option>
                            </select>
                            <i class="fa-solid fa-chevron-down"></i>
                        </div>

                        <div class="select-wrapper">
                            <select id="country-filter" onchange="if(currentTab === 'all') { resetNews(); loadNews(); }">
                                <option value="">Global (All Countries)</option>
                                <option value="us">🇺🇸 USA (Silicon Valley)</option>
                                <option value="gb">🇬🇧 United Kingdom</option>
                                <option value="in">🇮🇳 India</option>
                                <option value="de">🇩🇪 Germany</option>
                                <option value="kr">🇰🇷 South Korea</option>
                                <option value="jp">🇯🇵 Japan</option>
                                <option value="ru">🇷🇺 Russia</option>
                                <option value="kz">🇰🇿 Kazakhstan (Competitor)</option>
                                <option value="uz">🇺🇿 Uzbekistan (Local)</option>
                            </select>
                            <i class="fa-solid fa-globe"></i>
                        </div>
                    </div>

                    <div class="search-group">
                        <i class="fa-solid fa-magnifying-glass search-icon"></i>
                        <input id="keyword" placeholder="Search keywords..." />
                        <button onclick="loadNews()" class="search-btn">Search</button>
                    </div>
                </section>

                <div id="loader" style="display: none;">
                    <div class="spinner"></div>
                </div>

                <main id="news-container" class="tab-content"></main>

                <div id="dashboard-container" class="tab-content" style="display:none;">
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px;">
                        <div style="background:white; padding:20px; border-radius:12px; border:1px solid #e2e8f0;">
                            <h3 style="margin-top:0; color:#1e293b; font-size:1rem;">Topic Distribution</h3>
                            <div style="height: 300px; position: relative;">
                                <canvas id="topicChart"></canvas>
                            </div>
                        </div>
                        <div style="background:white; padding:20px; border-radius:12px; border:1px solid #e2e8f0;">
                            <h3 style="margin-top:0; color:#1e293b; font-size:1rem;">Top Sources</h3>
                            <div style="height: 300px; position: relative;">
                                <canvas id="sourceChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="nla-container" class="tab-content" style="display:none;">
                    <div style="margin-bottom: 20px; font-weight: 600; font-size: 1.1rem;" id="nla-breadcrumbs">
                        Select Jurisdiction
                    </div>
                    <div id="nla-grid"></div> 
                </div>

                <div id="nla-reader-modal" class="reader-modal">
                    <div class="reader-box">
                        <div class="reader-header">
                            <button class="close-reader" onclick="closeReader()">&times;</button>
                        </div>
                        <div class="reader-body" id="nla-reader-content"></div>
                    </div>
                </div>

                <div id="stats-container" class="tab-content" style="display:none;">
                    <div class="stats-grid" id="stats-grid"></div>
                </div>

                <div id="archive-container" class="tab-content" style="display: none;">
                    <!-- Topic chips bar -->
                    <div id="archive-topics" style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px;"></div>

                    <!-- Search + Add button -->
                    <div style="display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap;">
                        <div style="flex:1; min-width:200px; position:relative;">
                            <i class="fa-solid fa-magnifying-glass" style="position:absolute; left:14px; top:50%; transform:translateY(-50%); color:#94a3b8;"></i>
                            <input type="text" id="archive-search" placeholder="Search research..."
                                   oninput="filterArchive()"
                                   style="width:100%; padding:12px 16px 12px 40px; border-radius:10px; border:1px solid #cbd5e1; background:white; font-size:0.95rem; box-sizing:border-box;">
                        </div>
                        <button id="archive-add-btn" onclick="showArchiveForm()" style="display:none; padding:10px 20px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:600; cursor:pointer; white-space:nowrap;">
                            <i class="fa-solid fa-plus"></i> New Research
                        </button>
                    </div>

                    <!-- Research list -->
                    <div id="archive-list"></div>

                    <!-- Add/Edit form (hidden by default) -->
                    <div id="archive-form" style="display:none; padding:24px; background:#f8fafc; border-radius:12px; border:1px solid #e2e8f0; margin-bottom:24px;">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                            <h3 id="archive-form-title" style="margin:0; color:#1e293b;">New Research</h3>
                            <button onclick="hideArchiveForm()" style="background:none; border:none; font-size:1.3rem; cursor:pointer; color:#94a3b8;">&times;</button>
                        </div>
                        <input type="hidden" id="archive-edit-id">
                        <div style="display:grid; gap:12px;">
                            <input type="text" id="arch-title" placeholder="Title *" style="padding:10px 14px; border-radius:8px; border:1px solid #cbd5e1; font-size:0.95rem;">
                            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px;">
                                <input type="text" id="arch-topic" placeholder="Topic * (e.g. AI, Crypto)" style="padding:10px 14px; border-radius:8px; border:1px solid #cbd5e1; font-size:0.95rem;">
                                <select id="arch-doctype" style="padding:10px 14px; border-radius:8px; border:1px solid #cbd5e1; font-size:0.95rem;">
                                    <option value="article">Article</option>
                                    <option value="report">Report</option>
                                    <option value="brief">Brief / Memo</option>
                                    <option value="presentation">Presentation</option>
                                    <option value="analysis">Analysis</option>
                                </select>
                                <input type="text" id="arch-author" placeholder="Author" style="padding:10px 14px; border-radius:8px; border:1px solid #cbd5e1; font-size:0.95rem;">
                            </div>
                            <input type="text" id="arch-source" placeholder="Source URL (optional)" style="padding:10px 14px; border-radius:8px; border:1px solid #cbd5e1; font-size:0.95rem;">
                            <textarea id="arch-summary" placeholder="Summary (short description)" rows="2" style="padding:10px 14px; border-radius:8px; border:1px solid #cbd5e1; font-size:0.95rem; resize:vertical;"></textarea>
                            <textarea id="arch-content" placeholder="Full content / notes..." rows="8" style="padding:10px 14px; border-radius:8px; border:1px solid #cbd5e1; font-size:0.95rem; resize:vertical; font-family:inherit;"></textarea>
                            <button onclick="saveArchiveItem()" style="padding:12px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:600; cursor:pointer; font-size:1rem;">
                                <i class="fa-solid fa-floppy-disk"></i> Save
                            </button>
                        </div>
                    </div>

                    <!-- Reader panel for full content -->
                    <div id="archive-reader" style="display:none; padding:28px; background:white; border-radius:12px; border:1px solid #e2e8f0; margin-top:20px;"></div>
                </div>

                <div id="load-more-container">
                    <button id="load-more-btn" style="display:none;">Load More News</button>
                </div>

            </section>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
